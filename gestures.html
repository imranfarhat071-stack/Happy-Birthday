<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday!</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: black; overflow: hidden; font-family: sans-serif;
        }

        #particleCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #webcam {
            position: absolute; bottom: 20px; left: 20px; width: 150px; height: auto;
            border: 2px solid white; border-radius: 10px; z-index: 2; transform: scaleX(-1);
        }

        /* NEW: The Start Screen to bypass mobile security blocks */
        #startScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 50; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; color: white;
        }

        #startBtn {
            margin-top: 20px; padding: 15px 40px; font-size: 1.5rem; font-weight: bold;
            background: #FF9933; color: white; border: none; border-radius: 30px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 153, 51, 0.5);
        }

        /* The Birthday Modal */
        #birthdayModal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 40; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .card {
            background: linear-gradient(135deg, #FF9933 0%, #FFFFFF 50%, #138808 100%);
            padding: 40px; border-radius: 20px; max-width: 80%; color: black;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
        }

        .pdf-btn {
            background-color: #000080; color: white; border: none; padding: 15px 30px;
            font-size: 1.2rem; border-radius: 50px; text-decoration: none; display: inline-block;
            margin-top: 20px; font-weight: bold;
        }

        /* Error Text */
        #errorLog {
            position: absolute; top: 10px; left: 10px; z-index: 60; color: #ff5555;
            font-family: monospace; font-size: 12px; pointer-events: none;
        }

        @media (max-width: 768px) { #webcam { width: 100px; bottom: 10px; left: 10px; } }
    </style>
</head>
<body>

    <div id="errorLog"></div>

    <div id="startScreen">
        <h1>A Special Birthday Surprise</h1>
        <p>Please allow camera access when prompted.</p>
        <button id="startBtn">Tap to Start</button>
    </div>

    <canvas id="particleCanvas"></canvas>
    <video id="webcam" autoplay playsinline></video>

    <div id="birthdayModal">
        <div class="card">
            <h1>Happy Birthday! 🎉</h1>
            <p>You unlocked the secret gesture! Get ready for our Gangtok trip soon, brother.</p>
            <a href="Humanity in Small Acts_20260216_151711_0000.pdf" target="_blank" class="pdf-btn">Open Your Gift</a>
        </div>
    </div>

    <script>
        // Catch any hidden errors and print them to the screen so we can see them
        window.onerror = function(message, source, lineno, colno, error) {
            document.getElementById('errorLog').innerHTML += message + '<br>';
        };

        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const videoElement = document.getElementById('webcam');
        const modal = document.getElementById('birthdayModal');
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (particles.length === 0) initParticles();
        }
        window.addEventListener('resize', resizeCanvas);

        let particles = [];
        let currentState = 'NONE'; 

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y; this.baseX = x; this.baseY = y;
                this.targetX = x; this.targetY = y; this.vx = 0; this.vy = 0;
                this.size = Math.random() * 1.5 + 0.5; this.friction = 0.85; this.spring = 0.05; this.color = '#FFFFFF'; 
            }
            update(hands) {
                let isInteracting = false;
                if (currentState === 'NONE' || currentState === 'NAMASTE') {
                    for (let hand of hands) {
                        let dx = hand.x - this.x; let dy = hand.y - this.y;
                        let distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < 150) {
                            isInteracting = true;
                            let force = (150 - distance) / 150;
                            this.vx += (dx / distance) * force * 5; this.vy += (dy / distance) * force * 5;
                        }
                    }
                }
                if (!isInteracting) {
                    this.vx += (this.targetX - this.x) * this.spring; this.vy += (this.targetY - this.y) * this.spring;
                }
                this.vx *= this.friction; this.vy *= this.friction; this.x += this.vx; this.y += this.vy;
            }
            draw() {
                ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const numParticles = Math.floor((canvas.width * canvas.height) / 700);
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height));
            }
        }

        function formShape(shapeType) {
            const cx = canvas.width / 2; const cy = canvas.height / 2;
            particles.forEach(p => {
                if (shapeType === 'NONE' || shapeType === 'NAMASTE') {
                    p.targetX = p.baseX; p.targetY = p.baseY; p.color = '#FFFFFF';
                } 
                else if (shapeType === 'SQUARE') {
                    p.targetX = cx - 150 + Math.random() * 300; p.targetY = cy - 150 + Math.random() * 300; p.color = '#FFFFFF';
                } 
                else if (shapeType === 'CIRCLE') {
                    const angle = Math.random() * Math.PI * 2; const radius = Math.sqrt(Math.random()) * 150; 
                    p.targetX = cx + Math.cos(angle) * radius; p.targetY = cy + Math.sin(angle) * radius; p.color = '#FFFFFF';
                } 
                else if (shapeType === 'FLAG') {
                    p.targetX = cx - 225 + Math.random() * 450; p.targetY = cy - 150 + Math.random() * 300;
                    if (p.targetY < cy - 50) p.color = '#FF9933'; 
                    else if (p.targetY >= cy - 50 && p.targetY < cy + 50) {
                        p.color = '#FFFFFF'; 
                        if (Math.sqrt(Math.pow(p.targetX - cx, 2) + Math.pow(p.targetY - cy, 2)) < 40) p.color = '#000080'; 
                    } else p.color = '#138808'; 
                }
            });
        }

        function getDist(p1, p2) { return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2)); }

        function isNamaste(hand1, hand2) {
            const palmSize = getDist(hand1[0], hand1[9]);
            return (getDist(hand1[0], hand2[0]) < palmSize * 1.5 && getDist(hand1[9], hand2[9]) < palmSize * 1.5 && getDist(hand1[8], hand2[8]) < palmSize * 1.5);
        }

        function isSalute(lms) {
            const palm = getDist(lms[0], lms[9]);
            const extended = getDist(lms[8], lms[0]) > getDist(lms[5], lms[0]) && getDist(lms[12], lms[0]) > getDist(lms[9], lms[0]) && getDist(lms[16], lms[0]) > getDist(lms[13], lms[0]) && getDist(lms[20], lms[0]) > getDist(lms[17], lms[0]);
            const squeezed = getDist(lms[8], lms[20]) <= getDist(lms[5], lms[17]) * 1.2; 
            const tucked = getDist(lms[4], lms[5]) < palm * 0.8; 
            return extended && squeezed && tucked;
        }

        function isFist(lms) {
            return getDist(lms[8], lms[0]) < getDist(lms[5], lms[0]) && getDist(lms[12], lms[0]) < getDist(lms[9], lms[0]) && getDist(lms[16], lms[0]) < getDist(lms[13], lms[0]) && getDist(lms[20], lms[0]) < getDist(lms[17], lms[0]);
        }

        let currentHands = [];
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        hands.onResults((results) => {
            currentHands = [];
            let detectedState = 'NONE';
            if (results.multiHandLandmarks) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    currentHands.push({ x: (1 - results.multiHandLandmarks[i][9].x) * canvas.width, y: results.multiHandLandmarks[i][9].y * canvas.height });
                }
                if (results.multiHandLandmarks.length === 2 && isNamaste(results.multiHandLandmarks[0], results.multiHandLandmarks[1])) {
                    detectedState = 'NAMASTE';
                    modal.style.display = 'flex';
                }
                if (detectedState !== 'NAMASTE') {
                    for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                        const lms = results.multiHandLandmarks[i];
                        const label = results.multiHandedness[i].label; 
                        if (isSalute(lms)) detectedState = 'FLAG';
                        else if (isFist(lms)) {
                            if (label === 'Right' && detectedState !== 'FLAG') detectedState = 'SQUARE'; 
                            else if (label === 'Left' && detectedState !== 'FLAG' && detectedState !== 'SQUARE') detectedState = 'CIRCLE';
                        }
                    }
                }
            }
            if (detectedState !== currentState) { currentState = detectedState; formShape(currentState); }
        });

        // ONLY start the camera AFTER they tap the button
        startBtn.addEventListener('click', () => {
            startScreen.style.display = 'none'; // Hide the start screen
            resizeCanvas(); // Ensure canvas is correctly sized
            
            const camera = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480, facingMode: 'user'
            });
            
            camera.start().then(() => {
                animate(); // Start the particle loop once camera is successfully running
            }).catch((err) => {
                document.getElementById('errorLog').innerHTML = "Camera Blocked: " + err.message;
            });
        });

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(currentHands); particles[i].draw();
            }
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>

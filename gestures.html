<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday!</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #webcam {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 200px;
            height: auto;
            border: 2px solid white;
            border-radius: 10px;
            z-index: 2;
            transform: scaleX(-1);
            box-shadow: 0 4px 8px rgba(255, 255, 255, 0.2);
        }

        /* NEW: Beautiful Birthday Modal Overlay */
        #birthdayModal {
            display: none; /* Hidden until Namaste is detected */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 20;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        .card {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.4);
            max-width: 80%;
        }

        .card h1 {
            margin: 0 0 20px 0;
            color: #333;
            font-size: 2.5rem;
        }

        .card p {
            color: #555;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        /* The button they will click to safely open the PDF */
        .pdf-btn {
            background-color: #ff4b2b;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .pdf-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            #webcam { width: 120px; bottom: 10px; left: 10px; }
            .card h1 { font-size: 2rem; }
            .card p { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>
    <video id="webcam" autoplay playsinline></video>

    <div id="birthdayModal">
        <div class="card">
            <h1>Happy Birthday! 🎉</h1>
            <p>You unlocked the secret gesture! I made this just for you.</p>
            <a href="Humanity in Small Acts_20260216_151711_0000.pdf" target="_blank" class="pdf-btn">Open Your Gift</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const videoElement = document.getElementById('webcam');
        const modal = document.getElementById('birthdayModal');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }
        window.addEventListener('resize', resizeCanvas);

        let particles = [];
        let currentState = 'NONE'; 

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.baseX = x;     
                this.baseY = y;     
                this.targetX = x;
                this.targetY = y;
                this.vx = 0;        
                this.vy = 0;
                this.size = Math.random() * 1.2 + 0.3; 
                this.friction = 0.85; 
                this.spring = 0.05;   
                this.color = '#FFFFFF'; 
            }

            update(hands) {
                let isInteracting = false;
                if (currentState === 'NONE' || currentState === 'NAMASTE') {
                    for (let hand of hands) {
                        let dx = hand.x - this.x;
                        let dy = hand.y - this.y;
                        let distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < 150) {
                            isInteracting = true;
                            let force = (150 - distance) / 150;
                            this.vx += (dx / distance) * force * 4;
                            this.vy += (dy / distance) * force * 4;
                        }
                    }
                }
                if (!isInteracting) {
                    this.vx += (this.targetX - this.x) * this.spring;
                    this.vy += (this.targetY - this.y) * this.spring;
                }
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const densityDivisor = 700; 
            const numParticles = Math.floor((canvas.width * canvas.height) / densityDivisor);
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height));
            }
            currentState = 'NONE';
        }

        function formShape(shapeType) {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            particles.forEach(p => {
                if (shapeType === 'NONE' || shapeType === 'NAMASTE') {
                    p.targetX = p.baseX; p.targetY = p.baseY; p.color = '#FFFFFF';
                } 
                else if (shapeType === 'SQUARE') {
                    p.targetX = cx - 150 + Math.random() * 300; p.targetY = cy - 150 + Math.random() * 300; p.color = '#FFFFFF';
                } 
                else if (shapeType === 'CIRCLE') {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = Math.sqrt(Math.random()) * 150; 
                    p.targetX = cx + Math.cos(angle) * radius; p.targetY = cy + Math.sin(angle) * radius; p.color = '#FFFFFF';
                } 
                else if (shapeType === 'FLAG') {
                    p.targetX = cx - 225 + Math.random() * 450; p.targetY = cy - 150 + Math.random() * 300;
                    if (p.targetY < cy - 50) p.color = '#FF9933'; 
                    else if (p.targetY >= cy - 50 && p.targetY < cy + 50) {
                        p.color = '#FFFFFF'; 
                        if (Math.sqrt(Math.pow(p.targetX - cx, 2) + Math.pow(p.targetY - cy, 2)) < 40) p.color = '#000080'; 
                    } else p.color = '#138808'; 
                }
            });
        }

        function getDistance(p1, p2) { return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2)); }

        function isFist(landmarks) {
            return getDistance(landmarks[8], landmarks[0]) < getDistance(landmarks[5], landmarks[0]) &&
                   getDistance(landmarks[12], landmarks[0]) < getDistance(landmarks[9], landmarks[0]) &&
                   getDistance(landmarks[16], landmarks[0]) < getDistance(landmarks[13], landmarks[0]) &&
                   getDistance(landmarks[20], landmarks[0]) < getDistance(landmarks[17], landmarks[0]);
        }

        function isSalute(landmarks) {
            const palmSize = getDistance(landmarks[0], landmarks[9]);
            const isExtended = getDistance(landmarks[8], landmarks[0]) > getDistance(landmarks[5], landmarks[0]) &&
                               getDistance(landmarks[12], landmarks[0]) > getDistance(landmarks[9], landmarks[0]) &&
                               getDistance(landmarks[16], landmarks[0]) > getDistance(landmarks[13], landmarks[0]) &&
                               getDistance(landmarks[20], landmarks[0]) > getDistance(landmarks[17], landmarks[0]);
            const fingersSqueezed = getDistance(landmarks[8], landmarks[20]) <= getDistance(landmarks[5], landmarks[17]) * 1.05; 
            const thumbTucked = getDistance(landmarks[4], landmarks[5]) < palmSize * 0.75; 
            return isExtended && fingersSqueezed && thumbTucked;
        }

        function isNamaste(hand1, hand2) {
            const palmSize = getDistance(hand1[0], hand1[9]);
            return (getDistance(hand1[0], hand2[0]) < palmSize * 1.5 && 
                    getDistance(hand1[9], hand2[9]) < palmSize * 1.5 && 
                    getDistance(hand1[8], hand2[8]) < palmSize * 1.5);
        }

        let currentHands = [];

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        hands.onResults((results) => {
            currentHands = [];
            let detectedState = 'NONE';

            if (results.multiHandLandmarks) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    currentHands.push({
                        x: (1 - results.multiHandLandmarks[i][9].x) * canvas.width,
                        y: results.multiHandLandmarks[i][9].y * canvas.height
                    });
                }

                if (results.multiHandLandmarks.length === 2 && isNamaste(results.multiHandLandmarks[0], results.multiHandLandmarks[1])) {
                    detectedState = 'NAMASTE';
                    // Show the beautiful modal card!
                    modal.style.display = 'flex';
                }

                if (detectedState !== 'NAMASTE') {
                    for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                        const landmarks = results.multiHandLandmarks[i];
                        const handedness = results.multiHandedness[i].label; 

                        if (isSalute(landmarks)) detectedState = 'FLAG';
                        else if (isFist(landmarks)) {
                            if (handedness === 'Right' && detectedState !== 'FLAG') detectedState = 'SQUARE'; 
                            else if (handedness === 'Left' && detectedState !== 'FLAG' && detectedState !== 'SQUARE') detectedState = 'CIRCLE';
                        }
                    }
                }
            }

            if (detectedState !== currentState) {
                currentState = detectedState;
                formShape(currentState);
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480, facingMode: 'user'
        });
        camera.start();

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(currentHands);
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        resizeCanvas();
        animate();
    </script>
</body>
</html>
